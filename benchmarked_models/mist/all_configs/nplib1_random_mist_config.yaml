project: MIST
exp_name: NPLIB1_MIST_4096_random
seed: 1

dataset:
  fp_names: ["morgan4096"]
  data_folder: "${ML_MS_MIST_DATA_ROOT}"
  dataset: "NPLIB1"
  split_filename: "random.tsv"
  cache_featurizers: True
  spec_features: "peakformula"
  mol_features: "fingerprint"
  dataset_type: "default"
  cls_type: "ms1"
  magma_aux_loss: False
  magma_modulo: 512
  max_peaks: 10
  train_with_val: True

model:
  name: "mist"
  params:
    form_embedder: "pos-cos"
    magma_loss_lambda: 8
    iterative_preds: "growing"
    iterative_loss_weight: 0.4
    shuffle_train: True
    loss_fn: "cosine"
    hidden_size: 1024
    peak_attn_layers: 2
    set_pooling: "cls"
    spectra_dropout: 0.1
    num_heads: 8
    pairwise_featurization: True
    embed_instrument: False
    no_diffs: True
    refine_layers: 4

train_params:
  learning_rate: 0.00077
  lr_decay_frac: 0.9
  weight_decay: 1e-7
  scheduler: False
  cosine_schedule: True
  cosine_eta_min: 0.0
  warmup_frac: 0.1
  ema: True
  ema_decay: 0.995

train_settings:
  batch_size: 256
  num_workers: 8
  persistent_workers: True
  augment_data: False

trainer:
  max_epochs: 150
  devices: 1
  log_every_n_steps: 5
  accelerator: "gpu"
  gradient_clip_val: 5
  num_sanity_val_steps: 0

callbacks:
  patience: 20
  val_monitor: "val_loss"
  disable_validation: True
  save_last_only: True
  save_last: True
